<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusTrader — Operations Log & Quant Blog</title>
    <meta name="description" content="Weekly performance logs, neural network allocations, and operational reports for the self-learning NexusTrader algorithmic bot.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Marked JS for Markdown Parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --bg-primary: #080c14;
            --bg-secondary: #0f172a;
            --card-bg: rgba(15, 23, 42, 0.65);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --neon-blue: #00f0ff;
            --neon-purple: #a855f7;
            --neon-green: #10b981;
            --neon-red: #f43f5e;
            --neon-orange: #f59e0b;
            --shadow-main: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-primary);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.12) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.1) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text-primary);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
        }

        /* Glassmorphism Panel */
        .glass-panel {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            box-shadow: var(--shadow-main);
            padding: 40px;
            transition: border-color 0.3s ease;
        }

        .glass-panel:hover {
            border-color: rgba(0, 240, 255, 0.18);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: inherit;
        }

        .brand h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 26px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--neon-blue) 0%, var(--neon-purple) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand p {
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--neon-blue);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
        }

        /* Markdown Styling */
        .markdown-body {
            line-height: 1.6;
            font-size: 15px;
            color: #cbd5e1;
        }

        .markdown-body h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 28px;
            margin-bottom: 20px;
            color: var(--text-primary);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 10px;
        }

        .markdown-body h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 20px;
            margin-top: 30px;
            margin-bottom: 15px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .markdown-body h3 {
            font-size: 16px;
            margin-top: 20px;
            margin-bottom: 10px;
            color: var(--text-primary);
        }

        .markdown-body p {
            margin-bottom: 16px;
        }

        .markdown-body ul, .markdown-body ol {
            margin-bottom: 16px;
            padding-left: 20px;
        }

        .markdown-body li {
            margin-bottom: 8px;
        }

        /* Tables */
        .markdown-body table {
            width: 100%;
            border-collapse: collapse;
            margin: 24px 0;
            font-size: 14px;
        }

        .markdown-body th {
            background: rgba(255, 255, 255, 0.02);
            color: var(--text-primary);
            font-weight: 600;
            padding: 12px;
            border-bottom: 2px solid var(--border-color);
            text-align: left;
        }

        .markdown-body td {
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }

        .markdown-body tr:hover td {
            background: rgba(255, 255, 255, 0.01);
        }

        /* Alert blockquotes */
        .markdown-body blockquote {
            border-left: 4px solid var(--neon-blue);
            background: rgba(0, 240, 255, 0.03);
            padding: 15px 20px;
            border-radius: 0 8px 8px 0;
            margin: 20px 0;
            color: #94a3b8;
        }

        .markdown-body code {
            font-family: 'Courier New', Courier, monospace;
            background: rgba(255, 255, 255, 0.06);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 13px;
            color: #f43f5e;
        }

        .markdown-body pre {
            background: #090d16;
            border: 1px solid var(--border-color);
            padding: 20px;
            border-radius: 12px;
            overflow-x: auto;
            margin: 20px 0;
        }

        .markdown-body pre code {
            background: none;
            padding: 0;
            color: #38bdf8;
            font-size: 13px;
        }

        /* Links */
        .markdown-body a {
            color: var(--neon-blue);
            text-decoration: none;
            font-weight: 500;
            transition: text-shadow 0.2s ease;
        }

        .markdown-body a:hover {
            text-decoration: underline;
            text-shadow: 0 0 8px rgba(0, 240, 255, 0.4);
        }

        .markdown-body hr {
            border: 0;
            border-top: 1px solid var(--border-color);
            margin: 30px 0;
        }

        /* Utility classes */
        .color-green { color: var(--neon-green); }
        .color-red { color: var(--neon-red); }
        
        #error-msg {
            display: none;
            padding: 20px;
            background: rgba(244, 63, 94, 0.1);
            border: 1px solid var(--neon-red);
            border-radius: 8px;
            color: var(--neon-red);
            margin-top: 20px;
            font-weight: 500;
        }

        footer {
            text-align: center;
            margin-top: 40px;
            color: var(--text-muted);
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Main Blog Layout -->
        <div class="glass-panel">
            <header>
                <a href="#" class="brand" id="brand-link">
                    <i data-lucide="cpu" style="color: var(--neon-blue); width: 32px; height: 32px;"></i>
                    <div>
                        <h1>NexusTrader</h1>
                        <p>AI Operations Log</p>
                    </div>
                </a>
                <a href="#" class="back-btn" id="back-btn" style="display: none;">
                    <i data-lucide="arrow-left"></i> Back to Index
                </a>
            </header>

            <div id="error-msg">Failed to load content. Please check the URL.</div>
            
            <article class="markdown-body" id="blog-content">
                <p style="text-align: center; padding: 40px; color: var(--text-muted);">Loading logs...</p>
            </article>
        </div>

        <footer>
            <p>&copy; 2026 NexusTrader. Driven by Policy Gradient Reinforcement Learning.</p>
        </footer>
    </div>

    <script>
        const contentDiv = document.getElementById("blog-content");
        const backBtn = document.getElementById("back-btn");
        const errorMsg = document.getElementById("error-msg");
        const brandLink = document.getElementById("brand-link");

        // Fetch and render markdown file
        async function loadContent() {
            errorMsg.style.display = "none";
            let hash = window.location.hash.slice(1);
            
            // Clean hash URL
            if (hash.startsWith("file://")) {
                // Strip absolute local paths if they exist
                const parts = hash.split("/");
                hash = parts[parts.length - 1];
            }

            // Decide target file
            const targetFile = hash ? hash : "index.md";
            
            if (hash) {
                backBtn.style.display = "inline-flex";
            } else {
                backBtn.style.display = "none";
            }

            try {
                const response = await fetch(targetFile);
                if (!response.ok) {
                    throw new Error(`Failed to load ${targetFile}`);
                }
                const markdown = await response.text();
                
                // Parse markdown
                let html = marked.parse(markdown);
                
                // Post-process HTML: rewrite local file:// or relative links to hash links
                // Example: <a href="weekly_report_2026_07_16.md"> -> <a href="#weekly_report_2026_07_16.md">
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, "text/html");
                const links = doc.querySelectorAll("a");
                
                links.forEach(link => {
                    const href = link.getAttribute("href");
                    if (href && href.endsWith(".md") && !href.startsWith("http") && !href.startsWith("#")) {
                        // Strip any local file:/// prefixes
                        const cleanHref = href.replace(/^file:\/\/\/[A-Za-z]:/, "").replace(/^file:\/\//, "");
                        const filename = cleanHref.split("/").pop();
                        link.setAttribute("href", `#${filename}`);
                    }
                });

                contentDiv.innerHTML = doc.body.innerHTML;
                
                // Trigger Lucide icons reload
                lucide.createIcons();
                
                // Scroll to top
                window.scrollTo(0, 0);
            } catch (err) {
                console.error(err);
                errorMsg.style.display = "block";
                contentDiv.innerHTML = `<p style="text-align: center; color: var(--text-muted); padding: 40px;">Failed to load log report.</p>`;
            }
        }

        // Event Listeners
        window.addEventListener("hashchange", loadContent);
        window.addEventListener("DOMContentLoaded", loadContent);
        
        // Brand link click resets view
        brandLink.addEventListener("click", (e) => {
            if (window.location.hash) {
                e.preventDefault();
                window.location.hash = "";
            }
        });
        
        backBtn.addEventListener("click", (e) => {
            e.preventDefault();
            window.location.hash = "";
        });
    </script>
</body>
</html>
